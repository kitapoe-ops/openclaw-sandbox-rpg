[pytest]
# Local pytest config for the sandbox-rpg-tmp project.
# The parent's pyproject.toml at C:\Users\kitap\.openclaw\pyproject.toml
# has testpaths = ["skills"] which would otherwise miss backend/tests.

testpaths = backend/tests
python_files = test_*.py

# Suppress the Starlette deprecation warning that fires once per
# test session from fastapi/testclient.py's top-level
# `from starlette.testclient import TestClient` re-export. The
# warning is upstream (Starlette itself) and outside our control
# until we migrate to httpx2 / direct ASGI transport.
filterwarnings =
    ignore::starlette.exceptions.StarletteDeprecationWarning:fastapi.testclient
