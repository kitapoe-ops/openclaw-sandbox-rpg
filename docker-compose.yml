version: '3.9'

# ============================================
# OpenClaw Sandbox RPG — One-Command Deploy
# ============================================
# Usage:
#   docker-compose up -d           # Start all services
#   docker-compose logs -f backend # View backend logs
#   docker-compose down            # Stop all services
# ============================================

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: sandbox-rpg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sandbox_rpg}
      POSTGRES_USER: ${POSTGRES_USER:-rpg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-***password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rpg_user} -d ${POSTGRES_DB:-sandbox_rpg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sandbox-net

  # ==========================================
  # Backend (FastAPI)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    container_name: sandbox-rpg-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sandbox_rpg}
      POSTGRES_USER: ${POSTGRES_USER:-rpg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-***password}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sandbox-net

  # ==========================================
  # Frontend (Vue 3 + Vite) — Optional
  # ==========================================
  frontend:
    image: node:20-alpine
    container_name: sandbox-rpg-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      VITE_WS_BASE_URL: ws://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - sandbox-net

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  sandbox-net:
    driver: bridge
