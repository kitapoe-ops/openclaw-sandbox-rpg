semantic_states:
  stamina:
    levels:
      -
        level: 0
        label: fresh
        prompt: 精力充沛，彷彿可以再走十哩路。
      -
        level: 1
        label: slight_breath
        prompt: 略為喘氣，但仍可繼續行動。
      -
        level: 2
        label: muscle_ache
        prompt: 肌肉痠痛，需要短暫休息。
      -
        level: 3
        label: exhausted
        prompt: 幾近力竭，必須停下來。
      -
        level: 4
        label: collapse
        prompt: 意識模糊，即將倒下。
    transition_rules:
      max_shift_per_round: 1
      safe_environment_bonus: 1
  health:
    levels:
      -
        level: 0
        label: healthy
        prompt: 無傷無病。
      -
        level: 1
        label: wounded
        prompt: 皮肉傷，可繼續行動。
      -
        level: 2
        label: severely_wounded
        prompt: 嚴重創傷，需要治療。
      -
        level: 3
        label: dying
        prompt: 瀕死，每一刻都在流失生命。
      -
        level: 4
        label: dead
        prompt: 已死亡，靈魂可能尋找新載體。
  morale:
    levels:
      -
        level: 0
        label: elated
        prompt: 士氣高昂，喜形於色。
      -
        level: 1
        label: calm
        prompt: 冷靜且專注。
      -
        level: 2
        label: neutral
        prompt: 情緒平穩，無特別波動。
      -
        level: 3
        label: anxious
        prompt: 焦慮不安，懷疑每個陰影。
      -
        level: 4
        label: despair
        prompt: 陷入絕望，可能放棄抵抗。
physics_lock_rules:
  forbidden_actions:
    -
      state: 雙腿骨折
      forbidden: [奔跑, 跳躍, 攀爬]
    -
      state: 左臂骨折
      forbidden: [雙手握持, 投擲, 盾牌格擋]
    -
      state: 右臂骨折
      forbidden: [持劍攻擊, 持弓射擊, 雙手施法]
    -
      state: 嚴重內傷
      forbidden: [劇烈運動, 戰鬥, 嘔吐]
    -
      state: 失明
      forbidden: [遠程攻擊, 閱讀, 駕駛]
    -
      state: 啞疾
      forbidden: [語言施法, 吟唱, 呼救]
