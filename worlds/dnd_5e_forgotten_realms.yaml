# ============================================
# D&D 5e Forgotten Realms - Default World
# ============================================
# This is the starter world for OpenClaw Sandbox RPG.
# Uses D&D 5e SRD content (OGL/CC licensed).
# Generated by build_yaml.py - hand-edited, do NOT use PowerShell
# Set-Content/Out-File (they add BOM and break UTF-8).
# ============================================

world_meta:
  name: 被遺忘的國度：劍灣之心
  version: D&D_5e_v1.0
  description: 經典 D&D 5e 被遺忘國度設定，舞台設於劍灣北端的月井鎮，鄰近銀月森林與龍牙山脈。
  author: OpenClaw Sandbox RPG
  created_at: 2026-06-04
  total_tokens_estimate: 5200
eternal:
  physical_rules: [魔法需要法術位（MP）消耗；施展時需以語言、姿勢、材料三項中至少一項為媒介。, 死亡是永久性的，但靈魂可透過『魂魄轉移』法術或神祇介入，附身於新載體。, "時間流速與現實世界 1:1 對應，遊戲內一日等於現實一日，季節與月相同步。", 神祇的力量不可被凡人直接觀察，祈禱與信仰可獲得祝福，但代價因神而異。, 疾病、傷勢、飢餓皆以語意標籤呈現，不以數值計算，由 LLM 根據情境判讀。, 陣營傾向影響 NPC 對玩家行為的反應：守序善良者會譴責無辜殺害，混亂邪惡者會主動加害。]
  races:
    -
      name: 半精靈
      description: 人類與精靈的混血後裔，壽命介乎兩者之間，擁有異於常人的適應力。
      traits: [黑暗視野 60 呎, 精靈血統：對魅惑免疫, 兩種語言天賦, 技能靈活]
    -
      name: 矮人
      description: 居於山脈與地底的堅毅民族，工藝精湛，記仇且守諾。
      traits: [黑暗視野 120 呎, 對毒素抗性, 矮人韌性, 戰鬥斧與戰錘熟練]
    -
      name: 提夫林
      description: 帶有邪魔血統的人類後裔，外貌具備角與尾巴，常受社會偏見。
      traits: [黑暗視野 60 呎, 地獄裔抗性：火抗, 祕術血統, 群體邊緣化]
    -
      name: 人類
      description: 適應力最強的種族，分佈廣泛，沒有天賦加成但無任何弱點。
      traits: [額外技能熟練, 額外語言, 萬用種族, 野心勃勃]
  cultures:
    -
      name: 銀月聯邦
      values: [魔法共享, 知識普及, 種族共融, 個人自由]
    -
      name: 月井鎮自治
      values: [鄰里互助, 商旅中立, 民間自治, 慎防外侮]
    -
      name: 龍牙山脈氏族
      values: [榮譽至上, 氏族忠誠, 龍裔崇拜, 弱肉強食]
world_parameters:
  -
    id: param_dragon_threat
    name: 龍之威脅
    category: threat
    description: 龍牙山脈中巨龍的活動頻率與對周邊地區的威脅程度。
    current_level: 2
    fluctuation_limit: 0.15
    levels:
      -
        level: 0
        label: 沉睡
        description: 巨龍隱居於巢穴，幾乎不現身。
      -
        level: 1
        label: 甦醒
        description: 龍開始在山脈上空盤旋，偶有目擊。
      -
        level: 2
        label: 活動
        description: 龍襲擊商隊、要求進貢，邊境村莊人心惶惶。
      -
        level: 3
        label: 肆虐
        description: 巨龍頻繁出沒，燒毀村莊、向城鎮勒索。
      -
        level: 4
        label: 天災
        description: 古龍甦醒並發動聖戰，方圓百里化為焦土。
  -
    id: param_arcane_destabilization
    name: 祕術失序
    category: power
    description: 魔網（Weave）穩定程度；高代表魔法失控、低代表一切正常。
    current_level: 1
    fluctuation_limit: 0.15
    levels:
      -
        level: 0
        label: 穩定
        description: 魔網運作如常，法術穩定可預期。
      -
        level: 1
        label: 微擾
        description: 偶有魔法物品故障，法術偶爾反噬。
      -
        level: 2
        label: 波動
        description: 野生魔法生物增加，傳送門可能錯位。
      -
        level: 3
        label: 崩解
        description: 魔網局部崩潰，奧術師失能、魔寵暴動。
      -
        level: 4
        label: 寂滅
        description: 魔網中斷，法術完全失效或反噬施法者。
  -
    id: param_bandit_activity
    name: 盜匪活動
    category: threat
    description: 道路與森林中的盜匪集團活躍程度。
    current_level: 2
    fluctuation_limit: 0.15
    levels:
      -
        level: 0
        label: 寧靜
        description: 商路安全，夜不閉戶。
      -
        level: 1
        label: 零星
        description: 偶有小股盜賊出沒於林道。
      -
        level: 2
        label: 囂張
        description: 盜匪成群結隊攔截商隊，月井鎮外圍戒備森嚴。
      -
        level: 3
        label: 橫行
        description: 盜匪佔據道路據點，建立偽王國。
      -
        level: 4
        label: 淪陷
        description: 鄉村幾乎被匪幫控制，王法不彰。
  -
    id: param_plague_spread
    name: 瘟疫蔓延
    category: threat
    description: 疾病在城鎮與野外的擴散速度。
    current_level: 1
    fluctuation_limit: 0.15
    levels:
      -
        level: 0
        label: 無病
        description: 健康無疫情，藥房冷清。
      -
        level: 1
        label: 散發
        description: 個別村莊出現病例，藥草需求上升。
      -
        level: 2
        label: 流行
        description: 城鎮中出現群聚感染，街道冷清。
      -
        level: 3
        label: 爆發
        description: 醫院爆滿，街上有未掩埋的屍體。
      -
        level: 4
        label: 大疫
        description: 區域淪為死城，流亡者四散。
  -
    id: param_political_tension
    name: 政治張力
    category: economy
    description: 城邦、王國與商會之間的對立與緊張程度。
    current_level: 2
    fluctuation_limit: 0.15
    levels:
      -
        level: 0
        label: 和平
        description: 各方和睦，貿易繁盛。
      -
        level: 1
        label: 摩擦
        description: 邊界小爭執，外交照會頻繁。
      -
        level: 2
        label: 對峙
        description: 軍隊在邊境集結，談判破裂。
      -
        level: 3
        label: 危機
        description: 局部衝突爆發，盟約撕毀。
      -
        level: 4
        label: 戰爭
        description: 全面戰爭爆發，劍灣陷入烽火。
attitude_dimensions:
  -
    id: caution
    name: 謹慎
    description: 面對風險與未知時的警覺程度。
    levels:
      -
        level: 0
        label: 魯莽
        prompt: 角色不假思索地衝向危險，無視警告。
      -
        level: 1
        label: 大膽
        prompt: 角色敢於冒險但會評估成本。
      -
        level: 2
        label: 謹慎
        prompt: 角色步步為營，先探查再行動。
      -
        level: 3
        label: 怯懦
        prompt: 角色過度憂慮，拒絕任何風險。
  -
    id: empathy
    name: 同理
    description: 對他人處境與情感的關切程度。
    levels:
      -
        level: 0
        label: 冷漠
        prompt: 角色視他人如工具，不關心其感受。
      -
        level: 1
        label: 務實
        prompt: 角色只在有實際利益時才會幫人。
      -
        level: 2
        label: 體諒
        prompt: 角色願意聆聽並理解他人難處。
      -
        level: 3
        label: 慈悲
        prompt: 角色將他人苦難視為己出，主動犧牲。
  -
    id: aggression
    name: 侵略性
    description: 面對衝突時的進攻傾向。
    levels:
      -
        level: 0
        label: 被動
        prompt: 角色在被攻擊前不會還手。
      -
        level: 1
        label: 自衛
        prompt: 角色只在被威脅時反擊。
      -
        level: 2
        label: 主動
        prompt: 角色傾向以攻勢解決爭端。
      -
        level: 3
        label: 好鬥
        prompt: 角色尋求戰鬥作為優先解法。
  -
    id: curiosity
    name: 好奇
    description: 對未知事物、新知、祕密的探求慾望。
    levels:
      -
        level: 0
        label: 無感
        prompt: 角色對周遭事物毫不關心。
      -
        level: 1
        label: 隨興
        prompt: 角色遇到有趣事物才會駐足。
      -
        level: 2
        label: 求知
        prompt: 角色主動探究、見多識廣。
      -
        level: 3
        label: 執迷
        prompt: 角色為求真相不惜代價，可能踩入危險。
npcs:
  -
    id: npc_aria_moonwing
    name: 雅莉亞・月羽
    type: narrative
    description: 銀髮琥珀眼的半精靈女獵人，腰佩長弓與月牙匕首，神情自信且帶著一絲狡黠。
    background: 雅莉亞生於銀月森林的隱居村落，自幼由精靈養父與人類母親撫養長大。十六歲那年村落遭龍牙山脈巨龍襲擊，養父為掩護她而犧牲；母親則於瘟疫中辭世。她發誓守護月井鎮及其周邊，拒絕再讓任何人家破人亡。現為月井鎮守望者（Watchers）副隊長，與隊長托林合作無間。
    location: loc_moonwell_tavern
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: calm
    dialogue_hooks: [龍牙山脈最近的龍襲事件, 失蹤的銀月森林巡守隊, 她對精靈養父的回憶]
    attitude_baseline:
      trust: friendly
      talkativeness: normal
    quests_offered: [quest_dragon_shadow]
    tags: [half-elf, ranger, leader]
    can_be_soul_transferred: true
  -
    id: npc_torin_stonebeard
    name: 托林・石鬚
    type: narrative
    description: 身高五呎半的矮人，滿臉紅鬍、左眼有疤，總是叼著一根沒點燃的石楠木煙斗。
    background: 托林出身龍牙山脈深處的『鐵砧氏族』，年輕時是知名礦工。一次坑道崩塌後他失去左眼並離開家鄉，輾轉定居月井鎮，現為守望者隊長兼鎮議會議員。他對龍牙山脈的地形瞭如指掌，但絕口不提當年離開氏族的真正原因。
    location: loc_moonwell_town
    stats:
      stamina_level: slight_breath
      health_level: healthy
      morale_level: neutral
    dialogue_hooks: [守望者的編制與招募, 龍牙山脈地圖與祕徑, 他與氏族決裂的原因]
    attitude_baseline:
      trust: wary
      talkativeness: reserved
    quests_offered: [quest_dragon_shadow]
    tags: [dwarf, fighter, veteran]
    can_be_soul_transferred: true
  -
    id: npc_seraphine_duskwhisper
    name: 賽拉菲妮・暮語
    type: narrative
    description: 黑髮紫膚的提夫林女祭司，耳戴銀月石耳環，目光深邃如夜空星辰。
    background: 賽拉菲妮自幼被遺棄於月井鎮教堂門口，由前任祭司收養。她成年後繼承神殿，成為『暮語之後』的代言人——一尊關於祕法與死亡的神祇。她能看見靈魂的裂痕，因此不少冒險者生前死後都會來向她請益。
    location: loc_moonwell_town
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: calm
    dialogue_hooks: [靈魂轉移的儀式, 瘟疫患者的祈禱, 影沼遺跡的傳說]
    attitude_baseline:
      trust: neutral
      talkativeness: reserved
    quests_offered: [quest_lost_soul]
    tags: [tiefling, cleric, oracle]
    can_be_soul_transferred: true
  -
    id: npc_kaelin_emberhand
    name: 凱林・燼手
    type: narrative
    description: 棕髮削瘦的人類青年，眼神中帶著冒險家的熱忱與一絲魯莽。
    background: 凱林是月井鎮麵包師之子，從小聽著冒險故事長大。他拒絕繼承家業，與雅莉亞一同加入守望者，受訓成為斥候。他夢想有朝一日能踏入龍牙山脈，親眼見到巨龍。
    location: loc_silvermoon_forest
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: elated
    dialogue_hooks: [他在森林的日常巡邏, 對巨龍的好奇與恐懼, 麵包師父親的期許]
    attitude_baseline:
      trust: friendly
      talkativeness: talkative
    quests_offered: [quest_lost_soul]
    tags: [human, scout, apprentice]
    can_be_soul_transferred: true
  -
    id: npc_morrigan_thornveil
    name: 莫麗甘・荊幕
    type: narrative
    description: 身披綠袍的中年德魯伊，半人半鹿，雙角已分叉出第三對枝節。
    background: 莫麗甘是銀月森林的守護者之一，與森林中的動物和植物心電感應。她厭惡城鎮擴張，曾多次與鎮議會發生衝突。她只有一個軟肋——她多年前失散的人類女兒，凱林之母。
    location: loc_silvermoon_forest
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: neutral
    dialogue_hooks: [森林被伐木商人侵擾, 她失散的女兒, 影沼遺跡的封印]
    attitude_baseline:
      trust: wary
      talkativeness: reserved
    quests_offered: [quest_lost_soul]
    tags: [druid, shapeshifter, guardian]
    can_be_soul_transferred: true
  -
    id: npc_brewmaster_dorn
    name: 酒館老闆多恩
    type: functional
    description: 啤酒肚的紅潤中年，圍裙沾滿油漬，總是笑著遞上麥酒。
    background: 多恩是月井酒館的第三代老闆。他的祖父建立酒館，父親擴建，他則將其變成鎮上消息最靈通的地方。他認識每一位常客，也記得每位客人點過的酒。
    location: loc_moonwell_tavern
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: calm
    dialogue_hooks: [最新流言, 招牌菜與客房]
    attitude_baseline:
      trust: friendly
      talkativeness: talkative
    tags: [innkeeper, rumor-monger]
    can_be_soul_transferred: false
  -
    id: npc_merchant_finn
    name: 行商芬恩
    type: functional
    description: 金髮的輕佻人類，背著大背包，腰繫十幾個銅環，說話帶笑。
    background: 芬恩來自深水城，三年前開始固定在月井鎮販售雜貨與異國工藝品。他會高價收購冒險者的戰利品，據說與深水城某個走私商會有關。
    location: loc_moonwell_town
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: calm
    dialogue_hooks: [交易與議價, 深水城的工藝品]
    attitude_baseline:
      trust: neutral
      talkativeness: verbose
    tags: [merchant, smuggler]
    can_be_soul_transferred: false
  -
    id: npc_healer_lyra
    name: 草藥師萊拉
    type: functional
    description: 嬌小的半身人女藥師，總是低頭研磨草藥，偶爾抬頭露出關切眼神。
    background: 萊拉在月井鎮教堂旁開設草藥鋪，自學藥理二十年。她能調配治療藥水也能辨識毒草。她收費公道，遇到真正貧困者甚至免費醫治。
    location: loc_moonwell_town
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: calm
    dialogue_hooks: [藥水與草藥採購, 瘟疫期間的病患]
    attitude_baseline:
      trust: friendly
      talkativeness: reserved
    tags: [healer, herbalist]
    can_be_soul_transferred: false
  -
    id: npc_bandit_leader_grik
    name: 盜匪首格里克
    type: functional
    description: 半獸人壯漢，獨眼、戴著生鏽鐵盔，身上披著狼皮斗篷。
    background: 格里克原為龍牙山脈採礦奴工，逃出後聚集失業礦工與流民，建立『血鐵幫』。他對矮人氏族懷恨在心，誓言有一天要攻入鐵砧氏族祖地。
    location: loc_dragontooth_mountains
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: anxious
    dialogue_hooks: [劫掠商隊, 鐵砧氏族的舊恨]
    attitude_baseline:
      trust: hostile
      talkativeness: normal
    tags: [bandit, antagonist]
    can_be_soul_transferred: false
  -
    id: npc_shadow_apparition
    name: 影沼幽魂
    type: functional
    description: 漂浮在影沼遺跡上方的半透明人形，沒有五官，只有發出低沉呢喃的『嘴』。
    background: 影沼遺跡原是耐色瑞爾時代的祕法研究所，毀於一場失控實驗。幽魂是當年研究員的靈魂碎片，仍執著地守護殘存的祕法知識。他對生者並無惡意，但接近他可能觸發幻象。
    location: loc_shadow_marsh_ruins
    stats:
      stamina_level: fresh
      health_level: healthy
      morale_level: anxious
    dialogue_hooks: [耐色瑞爾的祕法, 靈魂轉移的代價]
    attitude_baseline:
      trust: wary
      talkativeness: silent
    tags: [undead, lore, guardian]
    can_be_soul_transferred: false
items:
  -
    id: item_iron_longsword
    name: 鐵製長劍
    type: weapon
    description: 平凡但保養良好的單手長劍，劍柄纏著磨損的皮革。
    interaction_patterns: [近戰斬擊, 投擲（短距）]
    rarity: common
    narrative_tags: [standard, military]
  -
    id: item_hunters_bow
    name: 獵人之弓
    type: weapon
    description: 紫杉木長弓，弓臂刻有銀月森林德魯伊的祝福符文。
    interaction_patterns: [遠程射擊, 近戰敲擊]
    rarity: uncommon
    narrative_tags: [blessed, ranged]
  -
    id: item_moonfang_dagger
