items:
  # === 武器 ===
  - id: "item_gundren_locket"
    name: "Gundren 嘅金項鍊"
    type: "quest"
    description: |
      矮人 Gundren Rockseeker 一直戴住嘅金項鍊。
      上面刻住 Rockseeker 家族嘅徽章（一個向下嘅鐵鎚）。
      項鍊嘅背面有一行矮人符文，意思係「永遠向著大地」。
      項鍊係 Gundren 父母留畀佢嘅遺物，佢從不除下。
    interaction_patterns:
      - "可以畀 Gundren 嘅兄弟睇，會觸發情感反應"
      - "可以喢掉換取金幣（~50gp），但會失去信任"
      - "可以保留作證據，證明 Gundren 嘅命運"
    rarity: "uncommon"
    narrative_tags: ["family_heirloom", "dwarven_craftsmanship", "quest_item"]

  - id: "item_glasstaff_spectacles"
    name: "Glasstaff 嘅魔法眼鏡"
    type: "magic"
    description: |
      一副細框金屬眼鏡，原本係 Neverwinter 嘅法師學徒 Iarno 嘅物品。
      戴住後可以施放低階法術（魔法飛彈 Magic Missile、火花術 Fire Bolt），
      每日各有 3 次。
      眼鏡有微小嘅裂痕（Iarno 嘅弱點）。
    interaction_patterns:
      - "戴上後可以施法"
      - "可以給法師角色使用，會有 [魔法裝備] 標籤"
      - "裂痕可以作為弱點攻擊"
    tags: ["magical", "fragile", "light"]
    rarity: "rare"
    narrative_tags: ["magic_item", "attunement_required", "wizard_legacy"]

  - id: "item_redbrand_mask"
    name: "紅印幫頭巾"
    type: "tool"
    description: |
      紅色嘅布頭巾，綁住一邊嘅金屬扣。
      紅印幫成員嘅標誌。
    interaction_patterns:
      - "可以偽裝成紅印幫成員潛入"
      - "可以喺 Tresendar Manor 識別敵人"
    rarity: "common"
    narrative_tags: ["disguise", "faction_marker"]

  - id: "item_cleansing_stone"
    name: "淨化石 (Cleansing Stone)"
    type: "quest"
    description: |
      Sister Garaele 嘅聖物，一塊刻有 Tymora 符文嘅白石。
      可以用嚟淨化負能量區域（Iarno 嘅塔）。
    interaction_patterns:
      - "用喺 Tower of Iarno 嘅傳送門，可中斷傳送"
      - "可保留作證物"
    tags: ["holy_property", "fragile", "magical"]
    rarity: "uncommon"
    narrative_tags: ["holy_relic", "quest_item"]

  # === 防具 / 一般物品 ===
  - id: "item_leather_armor"
    name: "皮革護甲"
    type: "armor"
    description: |
      標準嘅皮革護甲，啡色，適合冒險者初期使用。
    interaction_patterns:
      - "穿上後獲得 [輕度保護] 標籤"
    tags: ["flexible", "protective", "flammable"]
    rarity: "common"

  - id: "item_iron_dagger"
    name: "鐵匕首"
    type: "weapon"
    description: |
      標準嘅鐵匕首，~30cm 長。
    interaction_patterns:
      - "近戰攻擊"
      - "投擲"
    tags: ["sharp", "light", "metallic"]
    rarity: "common"

  - id: "item_hero_sword"
    name: "勇者之劍"
    type: "weapon"
    description: "傳說中具有神聖屬性的厚重長劍。"
    tags: ["sharp", "holy_damage", "heavy", "conductive"]
    rarity: "rare"
    narrative_tags: ["heavy_weapon", "holy_attribute"]

  # ... (再加 290+ 件物品)

# ============================================
# 永恆規則 + 語意狀態定義
# ============================================
semantic_states:
  stamina:
    levels:
      - {level: 0, label: "fresh", prompt: "[角色] 精神飽滿，動作敏捷，感官敏銳，呼吸平穩。"}
      - {level: 1, label: "slight_breath", prompt: "[角色] 輕微喘息，額頭滲出汗水，步伐略微沉重，但反應依然迅速。"}
      - {level: 2, label: "muscle_ache", prompt: "[角色] 每次揮動武器都感到吃力，視線偶爾無法集中，需要扶牆借力。"}
      - {level: 3, label: "exhausted", prompt: "[角色] 視線模糊，腳步蹣跚，肺部如火燒般刺痛，隨時可能倒下。"}
      - {level: 4, label: "collapse", prompt: "[角色] 完全失去意識，瀕臨死亡邊緣。觸發靈魂轉移或死亡結局。"}
    transition_rules:
      max_shift_per_round: 1
      safe_environment_bonus: 1

  health:
    levels:
      - {level: 0, label: "healthy", prompt: "[角色] 身體健康，無明顯傷勢。"}
      - {level: 1, label: "wounded", prompt: "[角色] 受到輕傷，有擦傷或瘀青，但不影響行動。"}
      - {level: 2, label: "severely_wounded", prompt: "[角色] 受到嚴重傷害，有明顯流血或骨折，行動受限。"}
      - {level: 3, label: "dying", prompt: "[角色] 瀕臨死亡，需要立即治療。"}
      - {level: 4, label: "dead", prompt: "[角色] 死亡。觸發靈魂轉移。"}
    transition_rules:
      max_shift_per_round: 1
      safe_environment_bonus: 1

  morale:
    levels:
      - {level: 0, label: "elated", prompt: "[角色] 士氣高昂，對未來充滿希望。"}
      - {level: 1, label: "calm", prompt: "[角色] 情緒平靜，能夠理性判斷。"}
      - {level: 2, label: "neutral", prompt: "[角色] 情緒平穩，冇特別波動。"}
      - {level: 3, label: "anxious", prompt: "[角色] 感到焦慮，會猶豫、懷疑自己嘅決定。"}
      - {level: 4, label: "despair", prompt: "[角色] 完全絕望，可能做出不理性嘅行為。"}
    transition_rules:
      max_shift_per_round: 1
      safe_environment_bonus: 1

  # ... (可加更多維度：alertness, social, hunger, thirst, fatigue)

# ============================================
# 物理邏輯鎖規則
# ============================================
physics_lock_rules:
  forbidden_actions:
    - state: "雙腿嚴重骨折"
      forbidden: ["狂奔", "跳躍", "攀爬", "衝刺", "疾跑"]
    - state: "左臂骨折"
      forbidden: ["雙手握劍", "投擲武器", "格擋"]
    - state: "右臂骨折"
      forbidden: ["雙手握劍", "寫字", "投擲武器"]
    - state: "雙臂骨折"
      forbidden: ["擁抱", "格擋", "投擲", "握手"]
    - state: "失明"
      forbidden: ["觀察", "瞄準", "閱讀", "搜索"]
    - state: "聾啞"
      forbidden: ["聆聽", "呼叫", "對話"]
    - state: "中毒"
      forbidden: ["劇烈運動", "戰鬥"]
    - state: "暈眩"
      forbidden: ["瞄準", "精細操作"]
    - state: "溺水"
      forbidden: ["說話", "施法"]
    - state: "燃燒中"
      forbidden: ["近戰", "精細操作"]

