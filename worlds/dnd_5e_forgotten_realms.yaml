locations:
  -
    id: loc_moonwell_town
    name: 月井鎮
    description: 石板路與木屋圍繞著一口古老月井的小鎮，井水在月圓之夜會發出淡銀光。鎮上約有三百位居民，北望龍牙山脈，南接銀月森林，東邊通往深水城官道。牆上張貼著近期的龍襲警告與守望者招募告示。
    atmosphere: peaceful
    environment: safe
    npcs_present: [npc_torin_stonebeard, npc_seraphine_duskwhisper, npc_merchant_finn, npc_healer_lyra]
    items_present: [item_healing_potion, item_antidote, item_trail_rations, item_lucky_coin]
    connected_to: [loc_moonwell_tavern, loc_silvermoon_forest, loc_dragontooth_mountains]
    tags: [outdoor, town, safe_zone, hub]
    ambient_sounds: [井水叮咚, 鐵匠敲擊, 孩子笑聲, 教堂鐘聲]
    first_visit_narrative: 你踏入月井鎮，空氣中混著柴火與木屑的味道。古井旁的老人抬頭望向你，隨即友善地點了點頭。一隻灰貓從屋簷跳下，蹭了蹭你的腳踝。
  -
    id: loc_moonwell_tavern
    name: 月井酒館
    description: 兩層樓的木石結構酒館，樓上是客房，樓下大廳擺著十幾張圓桌與一座壁爐。牆上掛著歷年守望者的合照，吧台後方酒架上陳列深水城麥酒與銀月森林花蜜酒。夜晚常有吟遊詩人駐唱，是冒險者交換消息的熱門地點。
    atmosphere: peaceful
    environment: safe
    npcs_present: [npc_aria_moonwing, npc_brewmaster_dorn]
    items_present: [item_trail_rations, item_healing_potion, item_bandit_map]
    connected_to: [loc_moonwell_town]
    tags: [indoor, safe_zone, social, inn]
    ambient_sounds: [酒杯碰撞, 壁爐噼啪, 談笑聲, 偶爾的琴音]
    first_visit_narrative: 你推開厚重的木門，一股熱氣撲面而來，混著麥酒與烤肉香。老闆多恩抬頭向你招呼：『生面孔啊，過來坐！麥酒一銅幣，烤雞三銅幣。』
  -
    id: loc_silvermoon_forest
    name: 銀月森林
    description: 古老的紫杉與橡樹交織成的密林，陽光從樹冠間灑下形成淡金色光柱。林間有會說話的烏鴉、守護林木的樹人，以及德魯伊隱居的小屋。夜間森林會發出銀白色螢光，是精靈亡者守護後代的迷思。
    atmosphere: mysterious
    environment: neutral
    npcs_present: [npc_kaelin_emberhand, npc_morrigan_thornveil]
    items_present: [item_hunters_bow, item_elven_cloak, item_herbalism_kit]
    connected_to: [loc_moonwell_town, loc_shadow_marsh_ruins]
    tags: [outdoor, forest, wildlife]
    ambient_sounds: [風吹葉動, 遠方狼嚎, 烏鴉低語, 溪水潺潺]
    first_visit_narrative: 你踏入銀月森林，腳下鬆軟的落葉發出輕響。一隻烏鴉落在枝頭，歪頭盯著你：『生者……你要尋找什麼？』
  -
    id: loc_dragontooth_mountains
    name: 龍牙山脈
    description: 黑色尖刺般的群山，常年雲霧繚繞。山腰有鐵砧氏族廢棄的礦坑，山頂是巨龍的領地——據說一頭黑龍在那裡築巢。空氣中帶有硫磺味與遠方閃電的臭氧氣息。
    atmosphere: ominous
    environment: unsafe
    npcs_present: [npc_bandit_leader_grik]
    items_present: [item_warhammer_stonebeard, item_dragon_scale, item_climbers_kit]
    connected_to: [loc_moonwell_town]
    tags: [outdoor, mountain, danger_zone, dragon-lair]
    ambient_sounds: [風嘯, 遠方雷鳴, 石塊滾落, 偶爾龍吟]
    first_visit_narrative: 你仰望龍牙山脈，雲霧中似乎有巨大陰影盤旋。一陣寒風掠過，你不由得握緊武器。
  -
    id: loc_shadow_marsh_ruins
    name: 影沼遺跡
    description: 陷入泥沼中的耐色瑞爾時代建築殘骸——半沒入黑水的石柱、崩塌的圓頂、與一座詭異地完整運轉的奧術反應爐。空氣中瀰漫著紫黑色霧氣，踩在木棧道上每一步都會發出吱嘎聲。當地人避之唯恐不及，但鍊金術士與靈魂學者視為聖地。
    atmosphere: mysterious
    environment: unsafe
    npcs_present: [npc_shadow_apparition]
    items_present: [item_necrotic_relic, item_sealed_letter, item_lantern_hooded]
    connected_to: [loc_silvermoon_forest]
    tags: [outdoor, ruins, danger_zone, arcane]
    ambient_sounds: [沼氣冒泡, 遠方呢喃, 金屬共振, 蛙鳴]
    first_visit_narrative: 你踏入影沼遺跡，紫黑色霧氣緩緩包裹你的靴子。遠處一道半透明的人影緩緩轉向你，沒有眼睛的臉上浮現一道蒼白的『嘴』。你聽見他說：『又一位訪客……小心，那些迴廊會讓你忘記自己是誰。』
quests:
  -
    id: quest_dragon_shadow
    name: 龍影疑雲
    type: main
    description: 近一個月，月井鎮北方的商隊接連遭襲，死者身上皆有灼傷與爪痕。守望者隊長托林懷疑是龍牙山脈的幼龍下山獵食，邀請冒險者實地調查。若放任不管，巨龍可能會更進一步逼近城鎮。
    trigger_condition: 與托林或雅莉亞對話，或主動詢問龍襲事件。
    npcs_involved: [npc_torin_stonebeard, npc_aria_moonwing, npc_bandit_leader_grik]
    locations_involved: [loc_moonwell_town, loc_moonwell_tavern, loc_dragontooth_mountains]
    branching_points:
      -
        branch_id: act1_investigate
        act: 1
        description: 抵達龍牙山脈後，玩家可選擇的調查方式。
        trigger: 抵達 loc_dragontooth_mountains
        possible_outcomes:
          -
            id: A1
            description: 直接攀登山脊，尋找龍巢。
            weight: 30
            lead_to: act2_climb
          -
            id: A2
            description: 從被襲商隊的廢墟尋找線索，循爪痕追蹤。
            weight: 50
            lead_to: act2_track
          -
            id: A3
            description: 擒拿血鐵幫的嘍囉，逼問龍的情報。
            weight: 20
            lead_to: act2_interrogate
      -
        branch_id: act2_discover
        act: 2
        description: 調查後發現的真相，玩家可決定下一步。
        trigger: 完成 act1 任一分支
        possible_outcomes:
          -
            id: B1
            description: 確認是巨龍所為，組織村民撤離。
            weight: 40
            lead_to: ending_evacuate
          -
            id: B2
            description: 確認是盜匪偽造的龍襲以嫁禍龍族。
            weight: 45
            lead_to: ending_expose_bandits
          -
            id: B3
            description: 發現是更古老的祕法失控造成灼傷。
            weight: 15
            lead_to: ending_weave_anomaly
    endings:
      -
        id: ending_evacuate
        name: 撤離之計
        condition: 成功疏散月井鎮北部居民，巨龍未再襲擊。
        description: 巨龍見獵物散去便返回巢穴，月井鎮暫時恢復平靜。但你知道這只是暫時的解決，總有一天巨龍會再次下山。
        epilogue: 數月後，新任守望者隊長在月井鎮廣場立起『龍影之役』紀念碑。
      -
        id: ending_expose_bandits
        name: 揭穿嫁禍
        condition: 向守望者提交龍鱗片為假證據，揭穿血鐵幫的嫁禍。
        description: 你將盜匪的偽造龍鱗片交給托林，守望者隨即出兵掃蕩血鐵幫。月井鎮恢復秩序，龍牙山脈的龍似乎察覺到人類並非全部敵意。
        epilogue: 格里克被捕入獄，他在獄中刻下『龍終將降臨』後絕食而亡。
      -
        id: ending_weave_anomaly
        name: 魔網真相
        condition: 在影沼遺跡找到相關祕法筆記，並交給暮語祭司。
        description: 原來灼傷來自影沼遺跡失控的耐色瑞爾反應爐。祭司賽拉菲妮帶領神殿封閉了反應爐，月井鎮恢復和平。
        epilogue: 影沼遺跡被神殿劃為禁區，幽魂的囈語從此消失在風中。
    estimated_rounds: 8
    tags: [dragon, main, investigation]
  -
    id: quest_lost_soul
    name: 失落的靈魂
    type: side
    description: 賽拉菲妮祭司最近在夢中看見一個孩子的靈魂遊蕩——那是三十年前死於瘟疫的凱林之兄。她請冒險者前往影沼遺跡，找回他散落的靈魂碎片，給他一個安息。任務也可選擇交給莫麗甘以母系血脈召喚。
    trigger_condition: 與賽拉菲妮或凱林對話，提及『失蹤的靈魂』關鍵字。
    npcs_involved: [npc_seraphine_duskwhisper, npc_kaelin_emberhand, npc_morrigan_thornveil, npc_shadow_apparition]
    locations_involved: [loc_moonwell_town, loc_silvermoon_forest, loc_shadow_marsh_ruins]
    branching_points:
      -
        branch_id: act1_prep
        act: 1
        description: 玩家準備儀式的方式。
        trigger: 在月井鎮接下任務
        possible_outcomes:
          -
            id: A1
            description: 向神殿購買儀式材料，需要 50 金幣。
            weight: 60
            lead_to: act2_travel
          -
            id: A2
            description: 請求莫麗甘協助——但要答應一個未說明的條件。
            weight: 40
            lead_to: act2_travel
      -
        branch_id: act2_ruins
        act: 2
        description: 在影沼遺跡的遭遇。
        trigger: 抵達 loc_shadow_marsh_ruins
        possible_outcomes:
          -
            id: B1
            description: 直接取得黯蝕聖徽，安全返回。
            weight: 50
            lead_to: ending_quiet
          -
            id: B2
            description: 觸發幽魂記憶幻象，承擔精神傷害。
            weight: 30
            lead_to: ending_vision
          -
            id: B3
            description: 嘗試與幽魂溝通，失敗導致其憤怒暴走。
            weight: 20
            lead_to: ending_combat
    endings:
      -
        id: ending_quiet
        name: 安息
        condition: 取得聖徽並完成祭司儀式。
        description: 孩子靈魂在銀月之光下消散，賽拉菲妮向你道謝。
        epilogue: 凱林在月井鎮教堂為兄長點上一盞長明燈。
      -
        id: ending_vision
        name: 真相之痛
        condition: 承擔幻象並看見孩子的回憶。
        description: 你承受幽魂的記憶，得知孩子死前最大的遺憾——他從未告訴母親莫麗甘他愛她。
        epilogue: 你決定找個夜晚，獨自去見莫麗甘。
      -
        id: ending_combat
        name: 暴走之影
        condition: 激怒幽魂，必須以戰鬥收場。
        description: 幽魂暴走化為黯蝕魔影，經一番苦戰才將其驅散。
        epilogue: 影沼遺跡從此安靜，但再也沒有人聽見那道呢喃。
    estimated_rounds: 4
    tags: [side, spirit, lore]
  -
    id: quest_bandit_trouble
    name: 血鐵幫之患
    type: side
    description: 守望者隊長托林懸賞：清剿盤據龍牙山脈入口的血鐵幫盜匪。完成任務可獲得 100 金幣與托林的謝禮。若願意，可嘗試說服格里克放下仇恨——但前提是找到他與鐵砧氏族的真正恩怨。
    trigger_condition: 與托林對話接下懸賞，或在龍牙山脈擊敗至少三名盜匪。
    npcs_involved: [npc_torin_stonebeard, npc_bandit_leader_grik]
    locations_involved: [loc_moonwell_town, loc_dragontooth_mountains]
    branching_points:
      -
        branch_id: act1_approach
        act: 1
        description: 玩家如何接近血鐵幫。
        trigger: 抵達龍牙山脈入口
        possible_outcomes:
          -
            id: A1
            description: 正面攻堅山寨。
            weight: 50
            lead_to: act2_raid
          -
            id: A2
            description: 偽裝成落難旅人潛入。
            weight: 30
            lead_to: act2_infiltrate
          -
            id: A3
            description: 邀請雅莉亞同行，以她的人脈談判。
            weight: 20
            lead_to: act2_negotiate
    endings:
      -
        id: ending_raid
        name: 剿匪
        condition: 血鐵幫被擊敗，格里克伏法或逃亡。
        description: 龍牙山脈入口恢復平靜，商旅重新通行。
        epilogue: 托林在鎮議會提案增設一支『山道巡守』小隊。
      -
        id: ending_infiltrate
        name: 暗影終結
        condition: 潛入並取得盜匪的走私帳冊，將其公諸於世。
        description: 帳冊揭露深水城某商會的走私網絡，守望者一舉查獲。
        epilogue: 商人芬恩悄然離開月井鎮，再也沒人見過他。
      -
        id: ending_negotiate
        name: 和解之路
        condition: 經由雅莉亞與格里克對話，說服他放棄復仇。
        description: 格里克接受和解，率領殘部加入守望者成為義警。
        epilogue: 托林與格里克在月井酒館共飲，象徵兩族和解。
    estimated_rounds: 5
    tags: [side, combat-optional, social]
